name: Validate Renovate Configs

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate preset files
        run: |
          set -euo pipefail

          mapfile -t files < <(git ls-files -- '*.json' '*.json5' ':(exclude).github/**')

          for file in "${files[@]}"; do
            echo "Validating $file"
            docker run --rm -v "$PWD:/work:ro" -w /work ghcr.io/jhofer-cloud/renovate:latest renovate-config-validator "$file"
          done
