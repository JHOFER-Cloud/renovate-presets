name: Validate Renovate Configs

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate preset files
        run: |
          set -euo pipefail

          while IFS= read -r file; do
            echo "Validating $file"
            docker run --rm -v "$PWD:/work" -w /work ghcr.io/jhofer-cloud/renovate:latest renovate-config-validator "$file"
          done < <(git ls-files '*.json')
