name: Validate Renovate Configs

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Validate preset files
        run: |
          set -euo pipefail

          while IFS= read -r file; do
            echo "Validating $file"
            npx --yes --package renovate@latest renovate-config-validator "$file"
          done < <(git ls-files '*.json')
